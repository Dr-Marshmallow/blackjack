<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack</title>
    <link rel="stylesheet" href="style.css">
    <script src="blackjack.js"></script>
</head>
<body>
    <header>
        <button id="sounds-btn">&#128226;</button>
        <h1>Blackjack</h1>
        <button id="hints-btn">&#128065;</button>
    </header>

    <div id="hud">
        <span id="chips-display">Chips: 1000</span>
        <span id="bet-display">Bet: 0</span>
    </div>

    <p id="game-status"></p>

    <p class="section-label">Dealer</p>
    <div class="hand-wrap">
        <div id="dealer-hand"></div>
        <div id="dealer-score" class="hand-score"></div>
    </div>

    <p class="section-label">You</p>
    <div id="player-hands-area">
        <div class="hand-wrap">
            <div id="player-hand"></div>
            <div id="player-score" class="hand-score"></div>
        </div>
        <div class="hand-wrap" id="hand-wrap-2" style="display:none">
            <div id="player-hand-2"></div>
            <div id="player-score-2" class="hand-score"></div>
        </div>
    </div>

    <div id="betting-area">
        <div id="chip-buttons">
            <button class="chip-btn" data-amount="5">5</button>
            <button class="chip-btn" data-amount="25">25</button>
            <button class="chip-btn" data-amount="50">50</button>
            <button class="chip-btn" data-amount="100">100</button>
            <button class="chip-btn" data-amount="500">500</button>
        </div>
        <div id="betting-controls">
            <button id="clear-bet-btn">Clear</button>
            <button id="deal-btn">Deal</button>
        </div>
    </div>

    <button id="play-again-btn">Play again</button>
    <div id="action-buttons">
        <button id="hit-btn">Hit</button>
        <button id="stay-btn">Stay</button>
        <button id="double-btn">Double</button>
        <button id="split-btn">Split</button>
    </div>
</body>
</html>
